<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <script>
      (function () {
        var key = 'estate-theme';
        var stored = localStorage.getItem(key);
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        document.documentElement.classList.add(theme);
      })();
    </script>
    <script>
      (function () {
        var key = 'estate-language';
        var stored = localStorage.getItem(key);
        var lang = stored === 'ar' || stored === 'en' ? stored : (navigator.language || 'en').toLowerCase().startsWith('ar') ? 'ar' : 'en';
        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estate — Real Estate Platform</title>
    <meta name="description" content="A premium, modern experience to explore exceptional homes." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=Cairo:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
